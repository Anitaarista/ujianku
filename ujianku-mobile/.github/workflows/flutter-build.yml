name: UjianKu Mobile - Flutter Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  FLUTTER_VERSION: '3.27.1'

jobs:
  # ==================== ANALYZE ====================
  analyze:
    name: Analyze & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze --no-fatal-infos || true

      - name: Run tests
        run: flutter test --no-pub || true

  # ==================== BUILD ANDROID APK ====================
  build-android:
    name: Build Android APK
    needs: analyze
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Release APK
        run: flutter build apk --release --no-tree-shake-icons

      - name: Build Debug APK
        run: flutter build apk --debug --no-tree-shake-icons

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: ujianku-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 90

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: ujianku-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30

  # ==================== BUILD ANDROID APP BUNDLE ====================
  build-aab:
    name: Build Android AAB
    needs: analyze
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build App Bundle
        run: flutter build appbundle --release --no-tree-shake-icons

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: ujianku-release-aab
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 90

  # ==================== CREATE RELEASE ====================
  create-release:
    name: Create Release
    needs: [build-android, build-aab]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version
        id: version
        run: |
          VERSION=$(grep 'version:' pubspec.yaml | head -1 | awk '{print $2}' | cut -d'+' -f1)
          BUILD_NUMBER=$(git rev-list --count HEAD)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "build_number=$BUILD_NUMBER" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION+$BUILD_NUMBER" >> $GITHUB_OUTPUT

      - name: Download Release APK
        uses: actions/download-artifact@v4
        with:
          name: ujianku-release-apk

      - name: Download Debug APK
        uses: actions/download-artifact@v4
        with:
          name: ujianku-debug-apk

      - name: Download AAB
        uses: actions/download-artifact@v4
        with:
          name: ujianku-release-aab

      - name: Rename artifacts
        run: |
          mv app-release.apk ujianku-${{ steps.version.outputs.version }}-release.apk
          mv app-debug.apk ujianku-${{ steps.version.outputs.version }}-debug.apk
          mv app-release.aab ujianku-${{ steps.version.outputs.version }}-release.aab

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "UjianKu Mobile ${{ steps.version.outputs.version }}"
          body: |
            ## UjianKu Mobile - Platform Ujian Online

            ### APK Files
            - **Release APK**: `ujianku-${{ steps.version.outputs.version }}-release.apk` (Production)
            - **Debug APK**: `ujianku-${{ steps.version.outputs.version }}-debug.apk` (Development)
            - **AAB**: `ujianku-${{ steps.version.outputs.version }}-release.aab` (Play Store)

            ### Cara Install
            1. Download file APK yang diinginkan
            2. Aktifkan "Install dari Sumber Tidak Dikenal" di pengaturan Android
            3. Buka file APK untuk menginstall

            ### Server
            - API: https://ujianku-admin.space-z.ai/api/v1
            - Website: https://ujianku-admin.space-z.ai/
          files: |
            ujianku-${{ steps.version.outputs.version }}-release.apk
            ujianku-${{ steps.version.outputs.version }}-debug.apk
            ujianku-${{ steps.version.outputs.version }}-release.aab
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
