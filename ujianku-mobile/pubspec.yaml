name: ujianku_mobile
description: Aplikasi mobile platform ujian online UjianKu untuk Siswa dan Pengawas.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Navigasi
  go_router: ^14.2.0

  # State Management
  provider: ^6.1.2

  # Jaringan
  http: ^1.2.1
  dio: ^5.4.3+1

  # Penyimpanan Lokal
  shared_preferences: ^2.2.3

  # UI & Tipografi
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  flutter_spinkit: ^5.2.1
  lottie: ^3.1.2
  percent_indicator: ^4.2.3
  flutter_staggered_grid_view: ^0.7.0

  # Notifikasi
  flutter_local_notifications: ^17.1.2

  # Utilitas
  intl: ^0.19.0
  url_launcher: ^6.2.6
  connectivity_plus: ^6.0.3
  path_provider: ^2.1.3
  permission_handler: ^11.3.1
  wakelock_plus: ^1.2.5
  flutter_windowmanager: ^0.2.0

  # Ikon
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
